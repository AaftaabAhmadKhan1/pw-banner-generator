<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - PW Banner Generator</title>
  <link rel="icon" type="image/jpeg" href="/icon.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4efe6;
      --panel: rgba(20, 28, 30, 0.92);
      --panel-soft: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f4f1ea;
      --muted: rgba(244, 241, 234, 0.7);
      --accent: #ff6a3d;
      --accent-2: #f7c66a;
      --accent-3: #79d6c6;
      --danger: #ff9f8d;
      --shadow: 0 30px 80px rgba(15, 20, 24, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Manrope', sans-serif;
      color: #172124;
      background:
        radial-gradient(circle at top left, rgba(255, 106, 61, 0.22), transparent 26%),
        radial-gradient(circle at 85% 18%, rgba(121, 214, 198, 0.28), transparent 22%),
        radial-gradient(circle at bottom right, rgba(247, 198, 106, 0.32), transparent 24%),
        linear-gradient(135deg, #efe4d2 0%, #f7f2ea 48%, #ece6dc 100%);
      overflow-x: hidden;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 999px;
      filter: blur(8px);
      opacity: 0.9;
      pointer-events: none;
    }
    body::before {
      width: 340px;
      height: 340px;
      top: -110px;
      left: -90px;
      background: linear-gradient(135deg, rgba(255, 106, 61, 0.38), rgba(247, 198, 106, 0.16));
    }
    body::after {
      width: 420px;
      height: 420px;
      right: -150px;
      bottom: -180px;
      background: linear-gradient(135deg, rgba(121, 214, 198, 0.34), rgba(49, 72, 75, 0.08));
    }
    .shell {
      width: min(1180px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: center;
      padding: 32px 0;
    }
    .hero {
      padding: 42px 24px 42px 8px;
      min-height: 420px;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3rem, 5vw, 5.2rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      margin: 24px 0 18px;
      max-width: 620px;
    }
    .hero-art {
      position: relative;
      width: min(520px, 100%);
      aspect-ratio: 1 / 1;
      margin-top: 14px;
      border-radius: 36px;
      background:
        radial-gradient(circle at 25% 25%, rgba(255, 106, 61, 0.42), transparent 24%),
        radial-gradient(circle at 72% 28%, rgba(121, 214, 198, 0.4), transparent 22%),
        radial-gradient(circle at 68% 72%, rgba(247, 198, 106, 0.42), transparent 24%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.18));
      border: 1px solid rgba(23, 33, 36, 0.08);
      box-shadow: 0 24px 48px rgba(83, 61, 42, 0.12);
      overflow: hidden;
    }
    .hero-art::before,
    .hero-art::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(23, 33, 36, 0.08);
    }
    .hero-art::before {
      width: 62%;
      height: 62%;
      left: 8%;
      top: 10%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
    }
    .hero-art::after {
      width: 42%;
      height: 42%;
      right: 10%;
      bottom: 12%;
      background: rgba(23, 33, 36, 0.08);
    }
    .hero-grid {
      position: absolute;
      inset: 8%;
      border-radius: 28px;
      background-image:
        linear-gradient(rgba(23, 33, 36, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 33, 36, 0.08) 1px, transparent 1px);
      background-size: 34px 34px;
    }
    .hero-chip {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #172124;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(23, 33, 36, 0.08);
      backdrop-filter: blur(10px);
    }
    .hero-chip.one {
      left: 10%;
      top: 14%;
    }
    .hero-chip.two {
      right: 12%;
      top: 26%;
    }
    .hero-chip.three {
      left: 18%;
      bottom: 16%;
    }
    .card {
      position: relative;
      overflow: hidden;
      padding: 30px;
      border-radius: 30px;
      color: var(--text);
      background:
        linear-gradient(160deg, rgba(17, 25, 27, 0.98), rgba(20, 29, 31, 0.94)),
        linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.09);
      isolation: isolate;
    }
    .card::before,
    .card::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      z-index: -1;
      pointer-events: none;
    }
    .card::before {
      width: 240px;
      height: 240px;
      top: -90px;
      right: -40px;
      background: radial-gradient(circle, rgba(255, 106, 61, 0.34), transparent 70%);
    }
    .card::after {
      width: 200px;
      height: 200px;
      left: -70px;
      bottom: -90px;
      background: radial-gradient(circle, rgba(121, 214, 198, 0.24), transparent 72%);
    }
    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.28);
    }
    .brand small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 5px;
    }
    .brand strong {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      letter-spacing: -0.04em;
    }
    .status-pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    h2 {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.1rem;
      letter-spacing: -0.04em;
    }
    .card p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }
    .error {
      margin: 20px 0 0;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 159, 141, 0.12);
      border: 1px solid rgba(255, 159, 141, 0.25);
      color: var(--danger);
      font-size: 14px;
      line-height: 1.5;
    }
    form {
      margin-top: 28px;
      display: grid;
      gap: 16px;
    }
    label {
      display: block;
      margin-bottom: 10px;
      color: rgba(244, 241, 234, 0.88);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .field {
      position: relative;
    }
    input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-radius: 20px;
      padding: 18px 20px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    input::placeholder { color: rgba(244, 241, 234, 0.35); }
    input:focus {
      border-color: rgba(247, 198, 106, 0.55);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 6px rgba(247, 198, 106, 0.12);
      transform: translateY(-1px);
    }
    button {
      border: none;
      border-radius: 20px;
      padding: 18px 22px;
      font-size: 16px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      color: #1a1d1f;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      box-shadow: 0 18px 36px rgba(255, 106, 61, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 44px rgba(255, 106, 61, 0.3);
      filter: saturate(1.05);
    }
    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
        padding: 24px 0 36px;
      }
      .hero {
        padding: 8px 8px 0;
      }
    }
    @media (max-width: 640px) {
      .shell {
        width: min(100% - 20px, 100%);
        gap: 18px;
      }
      .card {
        padding: 22px;
        border-radius: 24px;
      }
      h1 {
        font-size: 2.8rem;
      }
      h2 {
        font-size: 1.8rem;
      }
      .brand-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-art" aria-hidden="true">
        <div class="hero-grid"></div>
        <div class="hero-chip one">Batch Studio</div>
        <div class="hero-chip two">Design Flow</div>
        <div class="hero-chip three">Live Access</div>
      </div>
    </section>

    <section class="card">
      <div class="brand-row">
        <div class="brand">
          <img class="logo" src="/icon.jpg" alt="PW Banner Generator logo" />
          <div>
            <small>Secure Entry</small>
            <strong>PW Banner Generator</strong>
          </div>
        </div>
        <div class="status-pill">Allow-list Protected</div>
      </div>

      <h2>Sign in with your email</h2>
      <p>Use the email address approved by your admin. If your email has not been added yet, you'll need to be whitelisted before the app unlocks.</p>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="field">
          <label for="email">Work Email</label>
          <input id="email" type="email" name="email" placeholder="Enter your PW Email ID." required autofocus autocomplete="email" />
        </div>
        <button type="submit">Continue to Generator</button>
      </form>
    </section>
  </div>
</body>
</html>
